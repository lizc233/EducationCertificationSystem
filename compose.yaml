services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: education-certification-system
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rabbitmq_net
    ports:
      - "18080:8080"
    restart: unless-stopped
  qdrant:
    image: qdrant/qdrant:v1.15.4
    container_name: education-certification-qdrant
    networks:
      - rabbitmq_net
    ports:
      - "6333:6333"
    restart: unless-stopped

networks:
  rabbitmq_net:
    external: true
    name: rabbitmq_default
