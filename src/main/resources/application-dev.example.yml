spring:
  docker:
    compose:
      enabled: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/education_certification_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: your_mysql_username
    password: your_mysql_password
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: true
mybatis-plus:
  mapper-locations: classpath*:com/educationcertificationsystem/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
